<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Акселерометра</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ball {
            transition: transform 0.1s linear;
        }
        .data-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full space-y-6 text-center">
        <h1 class="text-3xl font-bold tracking-tight">Датчики Движения</h1>
        
        <!-- Визуализация -->
        <div class="relative w-64 h-64 bg-slate-800 rounded-3xl mx-auto overflow-hidden border-4 border-slate-700 shadow-2xl flex items-center justify-center">
            <div id="ball" class="ball w-12 h-12 bg-blue-500 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.5)]"></div>
            <!-- Сетка -->
            <div class="absolute inset-0 border border-white/5 pointer-events-none"></div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-px h-full bg-white/10"></div>
                <div class="h-px w-full bg-white/10"></div>
            </div>
        </div>

        <!-- Кнопка активации (нужна для iOS и современных Android) -->
        <div id="permission-zone">
            <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-bold transition-all active:scale-95">
                Запустить датчики
            </button>
        </div>

        <!-- Данные -->
        <div class="grid grid-cols-1 gap-4 text-left">
            <div class="data-card p-4 rounded-2xl">
                <h2 class="text-xs uppercase text-slate-400 font-bold mb-2 tracking-widest">Акселерометр (m/s²)</h2>
                <div class="grid grid-cols-3 gap-2">
                    <div>X: <span id="acc-x" class="font-mono text-blue-400">0.00</span></div>
                    <div>Y: <span id="acc-y" class="font-mono text-blue-400">0.00</span></div>
                    <div>Z: <span id="acc-z" class="font-mono text-blue-400">0.00</span></div>
                </div>
            </div>

            <div class="data-card p-4 rounded-2xl">
                <h2 class="text-xs uppercase text-slate-400 font-bold mb-2 tracking-widest">Гироскоп (deg)</h2>
                <div class="grid grid-cols-3 gap-2">
                    <div>α: <span id="gyro-a" class="font-mono text-emerald-400">0.00</span></div>
                    <div>β: <span id="gyro-b" class="font-mono text-emerald-400">0.00</span></div>
                    <div>γ: <span id="gyro-g" class="font-mono text-emerald-400">0.00</span></div>
                </div>
            </div>
        </div>

        <div id="status-msg" class="text-sm text-slate-500 italic">
            Ожидание взаимодействия...
        </div>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const startBtn = document.getElementById('start-btn');
        const statusMsg = document.getElementById('status-msg');

        const elements = {
            accX: document.getElementById('acc-x'),
            accY: document.getElementById('acc-y'),
            accZ: document.getElementById('acc-z'),
            gyroA: document.getElementById('gyro-a'),
            gyroB: document.getElementById('gyro-b'),
            gyroG: document.getElementById('gyro-g')
        };

        function updateUI(event) {
            const acc = event.accelerationIncludingGravity;
            if (acc) {
                elements.accX.innerText = acc.x?.toFixed(2) || '0.00';
                elements.accY.innerText = acc.y?.toFixed(2) || '0.00';
                elements.accZ.innerText = acc.z?.toFixed(2) || '0.00';

                // Визуализация шарика (инвертируем X для естественности)
                const moveX = (acc.x || 0) * -10;
                const moveY = (acc.y || 0) * 10;
                ball.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        }

        function updateOrientation(event) {
            elements.gyroA.innerText = event.alpha?.toFixed(2) || '0.00';
            elements.gyroB.innerText = event.beta?.toFixed(2) || '0.00';
            elements.gyroG.innerText = event.gamma?.toFixed(2) || '0.00';
        }

        async function initSensors() {
            try {
                // Проверка на iOS (требует явного разрешения)
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission !== 'granted') {
                        statusMsg.innerText = "Доступ отклонен пользователем.";
                        return;
                    }
                }

                window.addEventListener('devicemotion', updateUI);
                window.addEventListener('deviceorientation', updateOrientation);
                
                statusMsg.innerText = "Датчики активны";
                startBtn.classList.add('hidden');
                
                // Проверка: если через 500мс данные всё еще нули, возможно датчика нет
                setTimeout(() => {
                    if (elements.accX.innerText === '0.00' && elements.accY.innerText === '0.00') {
                        statusMsg.innerText = "Датчики не обнаружены или не передают данные.";
                    }
                }, 1000);

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Ошибка: " + error.message;
            }
        }

        startBtn.addEventListener('click', initSensors);

        // Для десктопов без датчиков (тестовая заглушка мышкой, если нужно проверить верстку)
        // Но по умолчанию мы ждем реальные события DeviceMotion
    </script>
</body>
</html>
