<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Михей: Цифровой Ультиматум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap');

        body {
            font-family: 'Comfortaa', crossorigin;
            background: #020617;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .character-layer {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
            overflow: hidden;
        }

        .character {
            height: 85vh;
            max-width: 100vw;
            object-fit: contain;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            bottom: -20px;
            opacity: 0;
            filter: blur(5px);
        }

        .character.mikhey.active {
            opacity: 1;
            filter: blur(0);
            transform: translateX(-18%) translateY(0);
        }

        .character.misha.active {
            opacity: 1;
            filter: blur(0);
            transform: translateX(18%) translateY(0);
        }

        #dialog-box {
            position: relative;
            width: 95%;
            max-width: 850px;
            background: rgba(2, 6, 23, 0.92);
            border: 2px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 1.5rem 1.5rem 0.5rem 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
        }

        #name-tag {
            position: absolute;
            top: -20px;
            left: 30px;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            padding: 6px 24px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.5);
        }

        #choices, #restart-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 50;
            width: 85%;
            max-width: 450px;
        }

        .choice-btn, .restart-btn {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #3b82f6;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .choice-btn:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .restart-btn {
            background: linear-gradient(45deg, #ef4444, #3b82f6);
            border: none;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border-radius: 50%;
            font-size: 0.9rem;
            line-height: 1;
            text-align: center;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #1e293b 0%, #020617 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden { display: none !important; }

        .glitch-text {
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; }
            50% { text-shadow: -2px 0 red, 2px 0 blue; }
            100% { text-shadow: 2px 0 red, -2px 0 blue; }
        }
    </style>
</head>
<body>

<div id="start-screen" class="overlay">
    <div class="text-center p-8">
        <h1 class="text-3xl md:text-5xl font-bold mb-4 glitch-text">ЦИФРОВОЙ УЛЬТИМАТУМ</h1>
        <p class="text-blue-400 mb-12 tracking-widest uppercase text-sm md:text-base">Михей против Миши</p>
        <div id="loading-area" class="mb-8">
            <div class="w-48 h-1 bg-slate-800 mx-auto rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="loader-text" class="text-sm mt-4 text-slate-500 italic">Инициализация...</p>
        </div>
        <button id="start-btn" onclick="startGame()" class="hidden px-12 py-5 bg-blue-600 hover:bg-blue-500 rounded-xl text-xl md:text-2xl font-black transition-all transform hover:scale-105 shadow-2xl">
            НАЧАТЬ ИГРУ
        </button>
    </div>
</div>

<div id="game-container" class="hidden">
    <div class="character-layer" id="characters">
        <img id="char-mikhey" class="character mikhey" src="https://testy-coder.github.io/TestyLemonad.png" alt="Михей">
        <img id="char-misha" class="character misha" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Max&mouth=serious&eyebrows=angry&eyes=eyeRoll&clothes=hoodie&clothingColor=262e3d" alt="Миша">
    </div>

    <div id="choices" class="hidden"></div>
    
    <div id="restart-container" class="hidden">
        <div onclick="resetGame()" class="restart-btn" title="Начать заново">Заново</div>
    </div>

    <div id="dialog-box" onclick="nextLine()">
        <div id="name-tag"></div>
        <div id="text-content" class="text-lg md:text-xl leading-relaxed"></div>
        <div id="click-hint" class="text-xs text-blue-500 mt-4 animate-bounce text-right font-bold uppercase tracking-widest">>>> Далее</div>
    </div>
</div>

<script>
    const gameData = {
        scenes: {
            start: {
                background: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1200",
                dialogs: [
                    { speaker: "Михей", text: "Снова этот шум в логах... Миша, я знаю, что ты здесь.", active: "mikhey" },
                    { speaker: "Миша", text: "Ты всегда был слишком проницательным, Михей. Но сегодня ты опоздал.", active: "misha" },
                    { speaker: "Миша", text: "Я активировал вирус 'Черный Сентябрь'. Через 5 минут вся база данных станет моей.", active: "misha" },
                    { speaker: "Михей", text: "Этому не бывать. Где ты прячешь главный сервер?", active: "mikhey" }
                ],
                choices: [
                    { text: "Искать в старом дата-центре", nextScene: "data_center" },
                    { text: "Взломать личный терминал Миши", nextScene: "terminal_hack" }
                ]
            },
            data_center: {
                background: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=1200",
                dialogs: [
                    { speaker: "Михей", text: "Здесь пусто... Погоди, это ловушка!", active: "mikhey" },
                    { speaker: "Миша", text: "Бинго! Пока ты бегал по подвалам, я уже переписал ядро системы.", active: "misha" },
                    { speaker: "Миша", text: "Твоя единственная надежда — сдаться и работать на меня.", active: "misha" }
                ],
                choices: [
                    { text: "Использовать экстренный бэкап", nextScene: "backup_ending" },
                    { text: "Перегрузить систему охлаждения", nextScene: "overload_ending" }
                ]
            },
            terminal_hack: {
                background: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1200",
                dialogs: [
                    { speaker: "Михей", text: "Его защита слабее, чем я думал. Гордыня его погубит.", active: "mikhey" },
                    { speaker: "Система", text: "Доступ разрешен. Обнаружен скрытый подпроцесс 'Misha_Final_Boss_Mode'." },
                    { speaker: "Миша", text: "Что?! Как ты прошел через мой фаервол?!", active: "misha" }
                ],
                choices: [
                    { text: "Стереть личность Миши из сети", nextScene: "deletion_ending" },
                    { text: "Зациклить его в бесконечном тесте", nextScene: "loop_ending" }
                ]
            },
            backup_ending: {
                isEnd: true,
                background: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?q=80&w=1200",
                dialogs: [
                    { speaker: "Михей", text: "Хорошо, что я храню копии на дискетах...", active: "mikhey" },
                    { speaker: "Миша", text: "Дискетах?! Ты динозавр! Нет! Мой вирус не может заразить аналоговый носитель!", active: "misha" },
                    { speaker: "Автор", text: "Михей восстановил систему. Миша в ярости, но побежден старыми технологиями." }
                ]
            },
            overload_ending: {
                isEnd: true,
                background: "https://images.unsplash.com/photo-1516110833967-0b5716ca1387?q=80&w=1200",
                dialogs: [
                    { speaker: "Михей", text: "Если я не могу владеть этим кодом, то и ты не сможешь!", active: "mikhey" },
                    { speaker: "Миша", text: "Стой! Температура растет! Мои серверы... они плавятся!", active: "misha" },
                    { speaker: "Автор", text: "Михей взорвал серверную. Миша остался без своей империи, а Михей ушел в закат героем." }
                ]
            },
            deletion_ending: {
                isEnd: true,
                background: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1200",
                dialogs: [
                    { speaker: "Михей", text: "Твоё эго слишком велико для этого интернета. Удаляю.", active: "mikhey" },
                    { speaker: "Миша", text: "Погоди... Я исчезаю... Я просто... 01001110 01101111...", active: "misha" },
                    { speaker: "Автор", text: "Михей полностью стер цифровой след Миши. Злодей больше никогда не выйдет в онлайн." }
                ]
            },
            loop_ending: {
                isEnd: true,
                background: "https://images.unsplash.com/photo-1510511459019-5dee995d3ff4?q=80&w=1200",
                dialogs: [
                    { speaker: "Михей", text: "Ты любишь баги? Теперь ты сам станешь багом.", active: "mikhey" },
                    { speaker: "Миша", text: "Почему сцена повторяется? Почему я снова говорю 'А, Михей!'? Нет! Выпусти меня!", active: "misha" },
                    { speaker: "Автор", text: "Миша заточен в бесконечном цикле собственной новеллы. Михей теперь абсолютный админ." }
                ]
            }
        }
    };

    let currentScene = 'start';
    let currentDialogIndex = 0;

    const assetsToLoad = [
        "https://testy-coder.github.io/TestyLemonad.png",
        "https://api.dicebear.com/7.x/avataaars/svg?seed=Max&mouth=serious&eyebrows=angry&eyes=eyeRoll&clothes=hoodie&clothingColor=262e3d",
        ...Object.values(gameData.scenes).map(s => s.background)
    ];

    function preloadAssets() {
        let loadedCount = 0;
        const total = assetsToLoad.length;
        const progressBar = document.getElementById('progress-bar');
        
        assetsToLoad.forEach(src => {
            const img = new Image();
            img.src = src;
            const updateProgress = () => {
                loadedCount++;
                const percentage = (loadedCount / total) * 100;
                progressBar.style.width = percentage + '%';
                if (loadedCount === total) onAssetsLoaded();
            };
            img.onload = updateProgress;
            img.onerror = updateProgress;
        });
    }

    function onAssetsLoaded() {
        document.getElementById('loading-area').classList.add('hidden');
        document.getElementById('start-btn').classList.remove('hidden');
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        renderScene();
    }

    function resetGame() {
        currentScene = 'start';
        currentDialogIndex = 0;
        document.getElementById('restart-container').classList.add('hidden');
        document.getElementById('click-hint').classList.remove('hidden');
        renderScene();
    }

    function renderScene() {
        const scene = gameData.scenes[currentScene];
        document.getElementById('game-container').style.backgroundImage = `url('${scene.background}')`;
        currentDialogIndex = 0;
        showDialog();
    }

    function showDialog() {
        const scene = gameData.scenes[currentScene];
        const dialog = scene.dialogs[currentDialogIndex];
        
        document.getElementById('choices').classList.add('hidden');
        document.getElementById('name-tag').innerText = dialog.speaker || "Система";
        document.getElementById('text-content').innerText = dialog.text;
        
        updateCharacters(dialog.active);
    }

    function updateCharacters(activeKey) {
        const chars = document.querySelectorAll('.character');
        chars.forEach(c => {
            c.classList.remove('active');
            c.style.display = 'none';
        });
        
        if (activeKey) {
            const activeImg = document.getElementById(`char-${activeKey}`);
            if (activeImg) {
                activeImg.style.display = 'block';
                setTimeout(() => activeImg.classList.add('active'), 50);
            }
        }
    }

    function nextLine() {
        const scene = gameData.scenes[currentScene];
        if (!document.getElementById('choices').classList.contains('hidden')) return;
        if (!document.getElementById('restart-container').classList.contains('hidden')) return;

        if (currentDialogIndex < scene.dialogs.length - 1) {
            currentDialogIndex++;
            showDialog();
        } else {
            if (scene.choices) {
                showChoices(scene.choices);
            } else if (scene.next) {
                currentScene = scene.next;
                renderScene();
            } else if (scene.isEnd) {
                showRestart();
            }
        }
    }

    function showChoices(choices) {
        const choiceContainer = document.getElementById('choices');
        choiceContainer.innerHTML = '';
        choiceContainer.classList.remove('hidden');
        
        choices.forEach(choice => {
            const btn = document.createElement('div');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = (e) => {
                e.stopPropagation();
                currentScene = choice.nextScene;
                renderScene();
            };
            choiceContainer.appendChild(btn);
        });
    }

    function showRestart() {
        document.getElementById('restart-container').classList.remove('hidden');
        document.getElementById('click-hint').classList.add('hidden');
    }

    window.onload = preloadAssets;
</script>

</body>
</html>
